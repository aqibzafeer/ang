<section class="contact-section">
  <div class="container">

    <div class="contact-card">

      <span class="tag">Get In Touch</span>

      <h2>Let's Work Together</h2>

      <p class="subtitle">
        Have a project in mind or looking for a developer?
        I’m available for freelance work, collaborations,
        and exciting opportunities.
      </p>

      <div class="contact-info">

        <a
          [href]="'mailto:' + email()"
          class="contact-box"
        >
          <span class="label">
            Email Me
          </span>

          <span class="value">
            {{ email() }}
          </span>
        </a>

        <a
          [href]="'tel:' + phone()"
          class="contact-box"
        >
          <span class="label">
            Call Me
          </span>

          <span class="value">
            {{ phone() }}
          </span>
        </a>

      </div>

      <a
        [href]="'mailto:' + email()"
        class="cta-btn"
      >
        Start a Project →
      </a>

    </div>
  </div>
</section>
